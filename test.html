<!DOCTYPE html>
<head>
<html lang="zh">
    <meta charset="utf-8">
    <style type="text/css">
       p {
          font-family:times;
          text-align:center;
          margin-left:auto;
          margin-right:auto;
          width:30%;
          height:20%;
      }
      img {
          margin-left:30%;
          margin-right:30%;
          width:40%;
          height:40%;
      }
    </style>
</head>
<body>
<p>点击灯泡让它亮起来</p>
<script>
function changeImage()
{
    element=document.getElementById('myimage')
    element.src="/images/pic_bulbon.gif";
    var randTime = Math.round(Math.random()*100);
    setTimeout("changeBackImage()", randTime + 200);
}
function changeBackImage()
{
    element=document.getElementById('myimage')
    element.src="/images/pic_bulboff.gif";
}
</script>
<img id="myimage" onclick="changeImage()" src="/images/pic_bulboff.gif">
</body>
