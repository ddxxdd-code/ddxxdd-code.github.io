<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
        
    <style type="text/css">
      p {
          font-family:times;
          text-align:center;
          margin-left:auto;
          margin-right:auto;
          width:30%;
          height:20%;
      }
    </style>
    
    <title>my first html</title>
</head>
<body>
<p>hello world</p>
<form action="quit()" method="get">
    <p>
        输入<kbd>quit</kbd>来退出
        <input type="text">
        <button onclick="quit()">Go</button>
    </p>
    <script>
        function quit() {
            window.alert("Please input again!");
        }
    </script>
</form>
<script>
function changeImage()
{
    //window.alert("Change");
    element=document.getElementById('myimage');
    element.src="/images/pic_bulbon.gif";
    setTimeout(sleep(),5000);
    changeBackImage();
}
function changeBackImage()
{
    //window.alert("Change back");
    element=document.getElementById('myimage');
    element.src="/images/pic_bulboff.gif";
}
function sleep(){
    window.alert("sleep");
}
</script>
<img id="myimage" onclick="changeImage()" src="/images/pic_bulboff.gif" width="100" height="180">
<p>点击灯泡就可以打开或关闭这盏灯</p>
</body>
</html>
